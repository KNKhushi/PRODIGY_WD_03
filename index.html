<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ambient">
        <div class="blob blob-a"></div>
        <div class="blob blob-b"></div>
        <div class="grid-glow"></div>
    </div>
    <div class="app">
        <header class="hero">
            <div class="title-stack">
                <div class="eyebrow">Neon Playground</div>
                <h1>Tic-Tac-Toe</h1>
                <p class="subtitle">Bold moves, bright wins, and a little cinematic drama.</p>
            </div>
            <div class="turn-card">
                <div class="turn-label">Current Turn</div>
                <div class="turn-chip" id="turnChip">X</div>
            </div>
        </header>
        <main class="game">
            <div id="board" class="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </main>
        <div id="status" class="status">Player X's turn</div>
        <div class="actions">
            <button id="reset">Reset Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
